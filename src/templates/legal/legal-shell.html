<!doctype html>
<html lang="cs">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="color-scheme" content="dark light" />
        <meta name="format-detection" content="telephone=no, email=no" />
        <title>{{title}}</title>
        <meta name="description" content="{{description}}" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body class="legal-page {{body_class}}">
        <header class="legal-header">
            <span class="logo">MH<span class="logo-accent">|</span>IT</span>
            <div class="subtitle">{{subtitle}}</div>
            <button
                class="nav-toggle"
                aria-label="Menu"
                aria-expanded="false"
                aria-controls="site-navigation"
                type="button"
            >
                Menu
            </button>
            <nav id="site-navigation" class="site-nav legal-nav">{{nav_links}}</nav>
        </header>

        <main>
            <section class="section glass-section legal-section">
                <h1 class="section-title">{{heading}}</h1>
                {{content}}
            </section>
        </main>

        <footer class="legal-footer">
            <p>&copy; 2025 Mykhailo Hyndriuk – IT podpora &amp; digitalizace</p>
            <nav class="footer-links" aria-label="Právní odkazy">
                <a href="privacy.html">Zásady ochrany osobních údajů</a>
                <a href="terms.html">Obchodní podmínky</a>
            </nav>
            <a class="btn-main legal-button" href="index.html">Zpět na hlavní stránku</a>
        </footer>
    </body>
    <script type="module" src="/src/entries/legal.js"></script>
</html>
